<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stack</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    touch-action: manipulation;
    user-select: none;
  }

  canvas {
    position: fixed;
    top: 0; left: 0;
    display: block;
    cursor: pointer;
  }

  #ui {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 20px 24px;
    z-index: 10;
    pointer-events: none;
  }

  #score {
    font-size: 52px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -2px;
    line-height: 1;
    text-shadow: 0 2px 16px rgba(0,0,0,0.5);
  }

  #best-wrap {
    text-align: right;
  }
  #best-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.45);
    font-weight: 600;
  }
  #best-score {
    font-size: 22px;
    font-weight: 700;
    color: rgba(255,255,255,0.75);
    line-height: 1.1;
  }

  #overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(14, 20, 40, 0.93);
    z-index: 20;
    gap: 12px;
    transition: opacity 0.25s;
  }
  #overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  #overlay h1 {
    font-size: 64px;
    font-weight: 900;
    color: #fff;
    letter-spacing: -3px;
    line-height: 1;
  }
  #final-score {
    font-size: 88px;
    font-weight: 900;
    color: #fff;
    line-height: 1;
    display: none;
  }
  #overlay-msg {
    font-size: 16px;
    color: rgba(255,255,255,0.5);
    text-align: center;
    max-width: 240px;
    line-height: 1.6;
    white-space: pre-line;
  }
  #play-btn {
    margin-top: 12px;
    padding: 18px 52px;
    background: #fff;
    color: #111;
    border: none;
    border-radius: 50px;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: transform 0.1s;
  }
  #play-btn:active { transform: scale(0.95); }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui">
  <div id="score">0</div>
  <div id="best-wrap">
    <div id="best-label">BEST</div>
    <div id="best-score">0</div>
  </div>
</div>

<div id="overlay">
  <h1>STACK</h1>
  <div id="final-score"></div>
  <p id="overlay-msg">Tap to drop blocks.\nStack them to reach the top!</p>
  <button id="play-btn">PLAY</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const overlay     = document.getElementById('overlay');
const scoreEl     = document.getElementById('score');
const bestEl      = document.getElementById('best-score');
const finalScoreEl = document.getElementById('final-score');
const overlayMsg  = document.getElementById('overlay-msg');
const playBtn     = document.getElementById('play-btn');

const BLOCK_H = 32;
const COLORS  = ['#e63946','#f4a261','#e9c46a','#06d6a0','#3a86ff',
                  '#8338ec','#fb5607','#2a9d8f','#ff006e','#ffbe0b'];

let W, H, dpr;
let blocks, moving, score, best, dead, camY, animCamY, speed, dir;

/* ── canvas sizing ── */
function resize() {
  dpr = window.devicePixelRatio || 1;
  W   = window.innerWidth;
  H   = window.innerHeight;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  canvas.width  = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

/* ── game init ── */
function initGame() {
  score    = 0;
  dead     = false;
  speed    = 3;
  dir      = 1;
  camY     = 0;
  animCamY = 0;               // reset camera immediately

  const bw  = Math.min(W * 0.65, 240);
  const bx  = (W - bw) / 2;
  const by  = H - 100;

  blocks = [{ x: bx, y: by, w: bw, color: '#3d405b' }];
  scoreEl.textContent = '0';
  spawnMoving();
}

function spawnMoving() {
  const prev = blocks[blocks.length - 1];
  moving = {
    x: dir > 0 ? -prev.w : W,
    y: prev.y - BLOCK_H,
    w: prev.w,
    color: COLORS[blocks.length % COLORS.length],
  };
}

/* ── drop logic ── */
function drop() {
  if (dead) return;
  const prev = blocks[blocks.length - 1];

  const ol = Math.max(moving.x, prev.x);
  const or = Math.min(moving.x + moving.w, prev.x + prev.w);
  const overlap = or - ol;

  if (overlap <= 0) { endGame(); return; }

  const perfect = Math.abs(overlap - prev.w) < 5;
  const nb = {
    x: perfect ? prev.x : ol,
    w: perfect ? prev.w : overlap,
    y: moving.y,
    color: moving.color,
  };

  blocks.push(nb);
  score++;
  scoreEl.textContent = score;

  if (score > best) {
    best = score;
    bestEl.textContent = best;
    localStorage.setItem('stack-best', best);
  }

  if (perfect) triggerPerfect(nb);

  speed = Math.min(3 + score * 0.13, 10);
  dir  *= -1;

  // Scroll camera up when stack grows into top 45% of screen
  const screenY = nb.y - camY;
  if (screenY < H * 0.45) {
    camY = nb.y - H * 0.45;
  }

  if (overlap < prev.w * 0.1) { endGame(); return; }
  spawnMoving();
}

/* ── perfect flash ── */
let flash = null;
function triggerPerfect(b) { flash = { b, t: 50 }; }

/* ── end ── */
function endGame() {
  dead = true;
  finalScoreEl.style.display = 'block';
  finalScoreEl.textContent   = score;
  overlayMsg.textContent     = score > 0
    ? `You stacked ${score} block${score === 1 ? '' : 's'}.`
    : 'Try to overlap the blocks!';
  playBtn.textContent = 'PLAY AGAIN';
  overlay.classList.remove('hidden');
}

function startGame() {
  overlay.classList.add('hidden');
  finalScoreEl.style.display = 'none';
  overlayMsg.textContent     = 'Tap to drop blocks.\nStack them to reach the top!';
  playBtn.textContent = 'PLAY';
  initGame();
}

/* ── render loop ── */
function loop() {
  requestAnimationFrame(loop);

  // Smooth camera
  animCamY += (camY - animCamY) * 0.12;

  ctx.clearRect(0, 0, W, H);

  // Background
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#0d1b2a');
  bg.addColorStop(1, '#1b2838');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  const oy = -animCamY;   // vertical offset

  // Stacked blocks
  for (const b of blocks) {
    const sy = b.y + oy;
    if (sy > H + 4 || sy + BLOCK_H < -4) continue;
    drawBlock(b.x, sy, b.w, b.color);
  }

  // Moving block
  if (!dead && moving) {
    moving.x += speed * dir;
    // Bounce at edges so it doesn't vanish
    if (dir > 0 && moving.x > W)              moving.x = -moving.w;
    if (dir < 0 && moving.x + moving.w < 0)   moving.x = W;

    const sy = moving.y + oy;
    drawBlock(moving.x, sy, moving.w, moving.color);
  }

  // Perfect flash text
  if (flash) {
    flash.t--;
    const alpha = flash.t / 50;
    const sy    = flash.b.y + oy - 14;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle   = '#fff';
    ctx.font        = 'bold 700 20px Segoe UI';
    ctx.textAlign   = 'center';
    ctx.fillText('PERFECT!', flash.b.x + flash.b.w / 2, sy);
    ctx.restore();
    if (flash.t <= 0) flash = null;
  }
}

function drawBlock(x, y, w, color) {
  // Drop shadow
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.fillRect(x + 3, y + 5, w, BLOCK_H);

  // Main block
  ctx.fillStyle = color;
  ctx.beginPath();
  bRect(x, y, w, BLOCK_H, 5);
  ctx.fill();

  // Top shine
  ctx.fillStyle = 'rgba(255,255,255,0.14)';
  ctx.beginPath();
  bRect(x, y, w, BLOCK_H * 0.45, 5);
  ctx.fill();
}

function bRect(x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

/* ── input ── */
canvas.addEventListener('pointerdown', e => { e.preventDefault(); if (!dead) drop(); });
playBtn.addEventListener('click', startGame);
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') {
    if (!overlay.classList.contains('hidden')) startGame();
    else drop();
  }
});

/* ── boot ── */
best = parseInt(localStorage.getItem('stack-best') || '0');
bestEl.textContent = best;
resize();
window.addEventListener('resize', resize);
loop();
</script>
</body>
</html>
